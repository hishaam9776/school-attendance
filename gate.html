<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gate Terminal - Dynamic Scanner</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #060814; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box; 
        }
        .terminal { 
            background: linear-gradient(145deg, rgba(20, 27, 48, 0.8), rgba(11, 15, 28, 0.8)); 
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 32px; 
            padding: 40px 30px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.05); 
            text-align: center; 
            width: 100%; 
            max-width: 460px; 
            backdrop-filter: blur(20px); 
            box-sizing: border-box;
        }
        h1 { font-size: 18px; color: #64748b; text-transform: uppercase; margin: 0 0 5px 0; tracking: 2px; font-weight: 700; }
        .clock { font-family: monospace; font-size: 32px; color: #38bdf8; margin-bottom: 25px; text-shadow: 0 0 20px rgba(56,189,248,0.5); font-weight: bold; }
        
        #reader { 
            width: 100%; 
            background: #02040a; 
            border-radius: 20px; 
            overflow: hidden; 
            border: 2px solid rgba(56,189,248,0.2) !important; 
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        #reader button {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            border: none; color: white; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; margin: 15px 0;
            box-shadow: 0 4px 15px rgba(59,130,246,0.3);
        }
        
        #status { 
            font-size: 16px; 
            margin-top: 25px; 
            color: #94a3b8; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.4;
        }
        .hint { font-size: 13px; color: #475569; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.03); padding-top: 15px; }
        .quick-text { margin-top: 25px; font-size: 11px; color: #475569; font-weight: 700; text-transform: uppercase; tracking: 1px; }
        .student-row { display: flex; gap: 8px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
        .std-btn { 
            background: rgba(30, 41, 59, 0.5); 
            border: 1px solid rgba(255,255,255,0.05); 
            color: #cbd5e1; 
            padding: 8px 14px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 12px; 
            font-weight: 500;
            transition: all 0.2s;
            flex: 1;
            min-width: 90px;
        }
        .std-btn:hover { border-color: #38bdf8; color: white; background: rgba(56,189,248,0.1); }

        /* 📱 Mobile Overrides */
        @media (max-width: 480px) {
            .terminal { padding: 25px 20px; border-radius: 20px; }
            .clock { font-size: 26px; }
            h1 { font-size: 15px; }
        }
    </style>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>

    <div class="terminal">
        <h1>Gate Scan System</h1>
        <div class="clock" id="clock">00:00:00 PM</div>
        
        <div id="reader"></div>
        
        <div id="status">Ready for Token Scan</div>
        
        <div class="quick-text">Hardware Simulator Backups</div>
        <div class="student-row">
            <button class="std-btn" onclick="onScanSuccess('11234')">Dawood</button>
            <button class="std-btn" onclick="onScanSuccess('11345')">Azaan</button>
            <button class="std-btn" onclick="onScanSuccess('9776')">Hishaam</button>
        </div>

        <div class="hint">Ecosystem automatically determines Check-In / Check-Out routing</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCWABDPdb4V7oq3i1RyN4dvQQfQ1YwGejE",
          authDomain: "schoolattendance-1fcbf.firebaseapp.com",
          projectId: "schoolattendance-1fcbf",
          storageBucket: "schoolattendance-1fcbf.firebasestorage.app",
          messagingSenderId: "833618260068",
          appId: "1:833618260068:web:70ee19bd5b2d3195b0af71"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }
        setInterval(updateClock, 1000); updateClock();

        let lastScannedId = null;
        let scanThrottleTimeout = null;

        function onScanSuccess(decodedText) {
            if (decodedText === lastScannedId) return;
            
            lastScannedId = decodedText;
            clearTimeout(scanThrottleTimeout);
            scanThrottleTimeout = setTimeout(() => { lastScannedId = null; }, 3000);

            const status = document.getElementById('status');
            status.innerText = "Processing Cloud Auth...";
            status.style.color = "#a855f7";

            db.collection("students").doc(decodedText).get().then((doc) => {
                if (doc.exists) {
                    const student = doc.data();
                    const name = student.name;
                    const timeNow = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    
                    let updateFields = {};

                    if (!student.gateCheckedIn || student.currentClassStatus === "Logged Out") {
                        updateFields = { gateCheckedIn: true, gateTime: timeNow, currentClassStatus: "In Hallways" };
                        status.innerHTML = `<div><div style="color:#22c55e; font-size:22px; font-weight:700;">ACCESS GRANTED</div><div style="color:#f1f5f9; font-size:14px; margin-top:3px;">Welcome, ${name}</div></div>`;
                    } else {
                        updateFields = { gateCheckedIn: false, gateExitTime: timeNow, currentClassStatus: "Logged Out" };
                        status.innerHTML = `<div><div style="color:#38bdf8; font-size:22px; font-weight:700;">EXIT APPROVED</div><div style="color:#f1f5f9; font-size:14px; margin-top:3px;">Goodbye, ${name}</div></div>`;
                    }

                    db.collection("students").doc(decodedText).update(updateFields);
                    setTimeout(() => { status.innerText = "Ready for Token Scan"; status.style.color = "#94a3b8"; }, 4000);
                } else {
                    status.innerText = "REJECTED: BAD SECURITY SIGNATURE";
                    status.style.color = "#ef4444";
                    setTimeout(() => { status.innerText = "Ready for Token Scan"; status.style.color = "#94a3b8"; }, 3000);
                }
            });
        }

        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: { width: 250, height: 250 } });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
